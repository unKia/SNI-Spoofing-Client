name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (arm64)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen create-dmg

      - name: Build release
        working-directory: macos-arm
        env:
          ALLOW_UNSIGNED_APP_BUILD: "1"
        run: ./build_release.sh arm64

      - name: Ad-Hoc Sign App
        working-directory: macos-arm
        run: |
          echo "Applying Ad-Hoc signature..."
          find . -name "*.app" -exec codesign --force --deep --sign - {} \; || true

      - name: Package DMG
        working-directory: macos-arm
        run: ./package_dmg.sh arm64

      - name: Ad-Hoc Sign DMG
        working-directory: macos-arm
        run: |
          echo "Signing DMG..."
          find dist/ -name "*.dmg" -exec codesign --force --sign - {} \; || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: macos-arm/dist/SniSpoofingClient-macos-arm64-*.dmg
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: artifacts/**/*.dmg
