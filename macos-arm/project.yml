name: SniSpoofingMac
options:
  minimumXcodeGenVersion: 2.44.1
  deploymentTarget:
    macOS: "13.3"
schemes:
  SniSpoofingMac:
    build:
      targets:
        SniSpoofingMac: all
        SniProxyHelper: [run, test, profile, analyze, archive]
    run:
      config: Debug
      executable: SniSpoofingMac
    test:
      config: Debug
    analyze:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
    management:
      shared: true
      isShown: true
settings:
  base:
    SWIFT_VERSION: 5.0
    MARKETING_VERSION: 1.2.2
    CURRENT_PROJECT_VERSION: 122
targets:
  SniSpoofingMac:
    type: application
    platform: macOS
    sources:
      - path: App/ContentView.swift
      - path: App/AppLocalization.swift
      - path: App/LocalProxyService.swift
      - path: App/SniSpoofingMacApp.swift
      - path: App/TunnelController.swift
      - path: App/VlessParser.swift
      - path: App/XrayManager.swift
      - path: App/Assets.xcassets
      - path: Shared/LibpcapBridge.m
      - path: Shared/LibpcapBridge.h
      - path: Shared/RawPacketSupport.swift
      - path: Shared/SystemNetworkUtils.swift
      - path: Shared/TunnelConfiguration.swift
      - path: Shared/TunnelMessages.swift
      - path: Shared/TLSClientHelloBuilder.swift
      - path: App/Resources/xray-arm64.bin
      - path: App/Resources/xray-x86_64.bin
      - path: App/Resources/flag_uk.svg
      - path: App/Resources/flag_ir.svg
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: SNI-Spoofing Client
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: "13.3"
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.sni.macos
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/SniSpoofingMac.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_OBJC_BRIDGING_HEADER: App/SniSpoofingMac-Bridging-Header.h
        OTHER_LDFLAGS:
          - $(inherited)
          - -lpcap
    dependencies:
      - target: SniProxyHelper
  SniProxyHelper:
    type: tool
    platform: macOS
    sources:
      - path: Helper/PrivilegedHelperMain.swift
      - path: App/LocalProxyService.swift
      - path: Shared/LibpcapBridge.m
      - path: Shared/LibpcapBridge.h
      - path: Shared/RawPacketSupport.swift
      - path: Shared/SystemNetworkUtils.swift
      - path: Shared/TunnelConfiguration.swift
      - path: Shared/TLSClientHelloBuilder.swift
    settings:
      base:
        PRODUCT_NAME: sni-proxy-helper
        CODE_SIGNING_ALLOWED: NO
        SWIFT_OBJC_BRIDGING_HEADER: Helper/SniProxyHelper-Bridging-Header.h
        OTHER_LDFLAGS:
          - $(inherited)
          - -lpcap
